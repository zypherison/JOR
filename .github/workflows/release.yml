name: "Release JOR"

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  create-release:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for tag detection

      # ── Determine next version ───────────────────────────
      - name: Calculate next version
        id: version
        shell: pwsh
        run: |
          # Get latest tag matching vX.Y.Z pattern
          $tags = git tag --list "v*" --sort=-version:refname 2>$null
          if ($tags) {
            $latest = ($tags | Select-Object -First 1).Trim()
            Write-Host "Latest tag: $latest"
            
            # Parse major.minor.patch
            $parts = $latest.TrimStart("v").Split(".")
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2]
            
            # Bump patch
            $patch++
            $next = "v$major.$minor.$patch"
          } else {
            $next = "v1.0.0"
          }
          
          Write-Host "Next version: $next"
          echo "VERSION=$next" >> $env:GITHUB_OUTPUT
          echo "VERSION_NUM=$($next.TrimStart('v'))" >> $env:GITHUB_OUTPUT

      # ── Sync version into project files ──────────────────
      - name: Update version in project files
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION_NUM }}"
          
          # Update tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $ver
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          
          # Update package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          
          # Update Cargo.toml version
          $lines = Get-Content src-tauri/Cargo.toml
          $inPackage = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\[package\]') { $inPackage = $true }
            elseif ($lines[$i] -match '^\[') { $inPackage = $false }
            if ($inPackage -and $lines[$i] -match '^version\s*=') {
              $lines[$i] = "version = `"$ver`""
              break
            }
          }
          $lines | Set-Content src-tauri/Cargo.toml

      # ── Setup toolchains ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      # ── Build with Tauri ─────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.VERSION }}
          releaseName: "JOR ${{ steps.version.outputs.VERSION }}"
          releaseBody: |
            ## JOR ${{ steps.version.outputs.VERSION }}
            
            ### 📦 Installation
            Download `JOR_${{ steps.version.outputs.VERSION_NUM }}_x64-setup.exe` or `JOR_${{ steps.version.outputs.VERSION_NUM }}_x64_en-US.msi` from the assets below.
          releaseDraft: false
          prerelease: false

      # ── Update WinGet Manifest ────────────────────────────
      - name: Update WinGet manifest hash
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION_NUM }}"
          # In Tauri v2, the output path might vary, so we search for it
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          
          if ($msiFile) {
            $hash = (Get-FileHash $msiFile.FullName -Algorithm SHA256).Hash
            Write-Host "Found MSI: $($msiFile.Name) with Hash: $hash"
            
            # Create new directory for this version in manifests if it doesn't exist
            $manifestBase = "winget/manifests/j/Jor/jor/$ver"
            if (!(Test-Path $manifestBase)) {
              New-Item -ItemType Directory -Path $manifestBase -Force
              # Copy templates from v1.0.0 (or whatever exists)
              Copy-Item "winget/manifests/j/Jor/jor/1.0.0/*" $manifestBase -Force
            }
            
            # Update the installer manifest
            $installerPath = "$manifestBase/Jor.jor.installer.yaml"
            $content = Get-Content $installerPath -Raw
            $content = $content -replace 'PackageVersion: .*', "PackageVersion: $ver"
            $content = $content -replace 'InstallerSha256: [A-F0-9]{64}', "InstallerSha256: $hash"
            $content = $content -replace 'InstallerUrl: .*', "https://github.com/${{ github.repository }}/releases/download/v${ver}/$($msiFile.Name)"
            Set-Content $installerPath $content -Encoding UTF8 -NoNewline
            
            # Update the version manifest
            $versionPath = "$manifestBase/Jor.jor.yaml"
            $vContent = Get-Content $versionPath -Raw
            $vContent = $vContent -replace 'PackageVersion: .*', "PackageVersion: $ver"
            Set-Content $versionPath $vContent -Encoding UTF8 -NoNewline

            # Update the locale manifest
            $localePath = "$manifestBase/Jor.jor.locale.en-US.yaml"
            $lContent = Get-Content $localePath -Raw
            $lContent = $lContent -replace 'PackageVersion: .*', "PackageVersion: $ver"
            Set-Content $localePath $lContent -Encoding UTF8 -NoNewline
            
            # Commit and push
            git config user.email "github-actions@github.com"
            git config user.name "GitHub Actions"
            git add "winget/manifests/j/Jor/jor/"
            git commit -m "chore: auto-update winget manifest for $ver"
            git push
          } else {
            Write-Warning "No MSI file found in build outputs. Skipping manifest update."
          }
