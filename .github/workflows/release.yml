name: "Release JOR"

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  create-release:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for tag detection

      # ── Set fixed version ───────────────────────────────
      # Always use v1.0.0 (no bumping) so the same winget link stays valid
      - name: Set fixed version
        id: version
        shell: pwsh
        run: |
          $next = "v1.0.0"
          
          Write-Host "Using fixed version: $next"
          echo "VERSION=$next" >> $env:GITHUB_OUTPUT
          echo "VERSION_NUM=1.0.0" >> $env:GITHUB_OUTPUT

      # ── Sync version into project files ──────────────────
      - name: Update version in project files
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION_NUM }}"
          
          # Update tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $ver
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          
          # Update package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $ver
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          
          # Update ONLY the [package] version in Cargo.toml (not dependency versions)
          $lines = Get-Content src-tauri/Cargo.toml
          $inPackage = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\[package\]') { $inPackage = $true }
            elseif ($lines[$i] -match '^\[') { $inPackage = $false }
            
            if ($inPackage -and $lines[$i] -match '^version\s*=') {
              $lines[$i] = "version = `"$ver`""
              break
            }
          }
          $lines | Set-Content src-tauri/Cargo.toml

      # ── Setup toolchains ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      # ── Build with Tauri ─────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.VERSION }}
          releaseName: "JOR ${{ steps.version.outputs.VERSION }}"
          releaseBody: |
            ## JOR ${{ steps.version.outputs.VERSION }}
            
            ### 📦 Installation
            Download `JOR_${{ steps.version.outputs.VERSION_NUM }}_x64-setup.exe` or `JOR_${{ steps.version.outputs.VERSION_NUM }}_x64_en-US.msi` from the assets below.
            
            ### ⚡ What's New
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.VERSION }}) for changes.
          releaseDraft: false
          prerelease: false

      # ── Update Winget manifest with installer hash ───────
      - name: Update Winget manifest hash
        shell: pwsh
        run: |
          $msiPath = "src-tauri/target/release/bundle/msi/JOR_${{ steps.version.outputs.VERSION_NUM }}_x64_en-US.msi"
          if (Test-Path $msiPath) {
            $hash = (Get-FileHash $msiPath -Algorithm SHA256).Hash
            Write-Host "MSI Hash: $hash"
            
            $manifestPath = "winget/manifests/j/Jor/jor/${{ steps.version.outputs.VERSION_NUM }}/Jor.jor.installer.yaml"
            if (Test-Path $manifestPath) {
              $content = Get-Content $manifestPath -Raw
              $content = $content -replace 'InstallerSha256: [A-F0-9]{64}', "InstallerSha256: $hash"
              Set-Content $manifestPath $content -Encoding UTF8 -NoNewline
              
              # Commit and push the manifest update
              git config user.email "github-actions@github.com"
              git config user.name "GitHub Actions"
              git add $manifestPath
              git commit -m "chore: update winget manifest hash for v${{ steps.version.outputs.VERSION_NUM }}"
              git push
            }
          }
