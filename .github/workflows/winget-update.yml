name: "Update WinGet Manifest"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  update-winget:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Release Assets and Calculate Hash
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          $msiName = "JOR_${ver}_x64_en-US.msi"
          $url = "https://github.com/${{ github.repository }}/releases/download/v${ver}/${msiName}"
          
          Write-Host "Downloading ${url}..."
          try {
            Invoke-WebRequest -Uri $url -OutFile "installer.msi"
          } catch {
            Write-Error "Failed to download installer. Check if version v${ver} exists and has ${msiName}."
            exit 1
          }
          
          $hash = (Get-FileHash "installer.msi" -Algorithm SHA256).Hash
          Write-Host "New SHA256 Hash: $hash"
          
          # Output manifest snippet for easy copy-paste to existing PR
          Write-Host "`n--- COPY FOR WINGET MANIFEST ---"
          Write-Host "InstallerUrl: ${url}"
          Write-Host "InstallerSha256: ${hash}"
          Write-Host "-------------------------------`n"
          
          $manifestPath = "winget/manifests/j/Jor/jor/${ver}/Jor.jor.installer.yaml"
          if (Test-Path $manifestPath) {
            $content = Get-Content $manifestPath -Raw
            # Update the hash
            $content = $content -replace 'InstallerSha256: [A-F0-9]{64}', "InstallerSha256: $hash"
            # Also update the URL in case it changed
            $content = $content -replace 'InstallerUrl: .*', "InstallerUrl: ${url}"
            
            Set-Content $manifestPath $content -Encoding UTF8 -NoNewline
            
            Write-Host "Updated manifest at ${manifestPath}"
            
            # Commit and push
            git config user.email "github-actions@github.com"
            git config user.name "GitHub Actions"
            git add $manifestPath
            git commit -m "chore: update winget manifest hash for v${ver}"
            git push
          } else {
            Write-Error "Manifest not found at ${manifestPath}"
            exit 1
          }
