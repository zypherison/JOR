<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOR Clipboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    :root {
      --bg-top: #2a2d31;
      --bg-mid: #23262b;
      --bg-bottom: #1b1e22;
      --panel-border: rgba(236, 236, 236, 0.2);
      --panel-inset: rgba(255, 255, 255, 0.12);
      --surface: rgba(255, 255, 255, 0.05);
      --text-main: #f1f1f1;
      --text-muted: #acb1b8;
      --text-soft: rgba(231, 234, 238, 0.6);
      --accent: #d7dce2;
      --active-bg: linear-gradient(120deg, rgba(194, 202, 211, 0.2), rgba(149, 157, 166, 0.2));
      --active-border: rgba(209, 216, 224, 0.48);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      color: var(--text-main);
      font-family: "Space Grotesk", sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    .ambient-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 36%, transparent 88%);
      opacity: 0.14;
    }

    #launcher {
      width: 100%;
      height: 100%;
      border-radius: 0;
      border: none;
      background: linear-gradient(145deg, rgba(33, 42, 57, 0.8), rgba(22, 28, 39, 0.72));
      box-shadow: inset 0 1px 0 var(--panel-inset), 0 30px 90px rgba(8, 11, 17, 0.45);
      backdrop-filter: blur(24px) saturate(140%);
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.4vh, 12px);
      padding: clamp(10px, 1.8vh, 14px);
      overflow: hidden;
      animation: panel-enter 160ms cubic-bezier(0.2, 0.9, 0.3, 1) both;
    }

    @keyframes panel-enter {
      from { opacity: 0; transform: translateY(-8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: clamp(14px, 2.2vh, 20px) clamp(14px, 2.2vw, 20px);
      border-radius: clamp(12px, 1.8vw, 16px);
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
    }

    .search-pill {
      font-size: 11px;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      color: #d7dbe0;
      border: 1px solid rgba(199, 204, 210, 0.45);
      background: rgba(163, 169, 176, 0.15);
      padding: 2px 8px;
      border-radius: 999px;
      font-family: "JetBrains Mono", monospace;
    }

    input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: clamp(19px, 2.6vw, 24px);
      color: var(--text-main);
      font-family: "Space Grotesk", sans-serif;
    }

    .clear-btn {
      background: rgba(255, 50, 50, 0.12);
      border: 1px solid rgba(255, 50, 50, 0.25);
      color: #ff8888;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 10px;
      cursor: pointer;
      font-family: "JetBrains Mono", monospace;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(255, 50, 50, 0.2); border-color: rgba(255, 50, 50, 0.4); }

    #results {
      flex: 1;
      list-style: none;
      overflow-y: auto;
      padding: 3px;
      border-radius: clamp(12px, 1.6vw, 16px);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.012));
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #results::-webkit-scrollbar { width: 8px; }
    #results::-webkit-scrollbar-thumb { background: rgba(214, 218, 224, 0.36); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }

    .item {
      margin: 3px;
      padding: 10px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      border: 1px solid transparent;
    }

    .item:hover { background: rgba(255, 255, 255, 0.045); }
    .item.active {
      background: var(--active-bg);
      border-color: var(--active-border);
      transform: translateX(1px);
    }

    .item-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.11);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-icon svg {
      width: 17px;
      height: 17px;
      stroke: var(--text-muted);
      stroke-width: 1.5;
      fill: none;
    }

    .item.active .item-icon svg { stroke: var(--accent); }

    .item-text { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 11px; color: var(--text-muted); font-family: "JetBrains Mono", monospace; }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: clamp(10px, 1.4vw, 14px);
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
      font-size: 10px;
      color: var(--text-soft);
      font-family: "JetBrains Mono", monospace;
    }

    kbd { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.24); border-radius: 4px; padding: 1px 6px; }
  </style>
</head>
<body>
  <div class="ambient-grid"></div>
  <div id="launcher">
    <div class="search-bar">
      <span class="search-pill">Clipboard</span>
      <input type="text" id="search-input" placeholder="Search history..." autocomplete="off" autofocus>
      <button class="clear-btn" id="clear-btn">Clear All</button>
    </div>
    <ul id="results"></ul>
    <div class="footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate &nbsp; <kbd>↵</kbd> copy &nbsp; <kbd>⎋</kbd> close</span>
      <span>JOR Clip v1.0</span>
    </div>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;

    const input = document.getElementById("search-input");
    const results = document.getElementById("results");
    const clearBtn = document.getElementById("clear-btn");
    const appWindow = getCurrentWindow();

    let selectedIndex = 0;
    let entries = [];

    async function performSearch() {
      const query = input.value;
      try {
        entries = await invoke("search", { query, mode: "clipboard" });
        renderResults();
      } catch (err) {
        console.error(err);
      }
    }

    function renderResults() {
      results.innerHTML = "";
      if (entries.length === 0) {
        results.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-size: 12px; font-family: 'JetBrains Mono'">No history found.</div>`;
        return;
      }

      entries.forEach((entry, i) => {
        const li = document.createElement("li");
        li.className = "item" + (i === selectedIndex ? " active" : "");
        li.innerHTML = `
          <div class="item-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </div>
          <div class="item-text">
            <div class="item-name">${entry.name}</div>
            <div class="item-sub">${entry.subtitle}</div>
          </div>
        `;
        li.onclick = () => executeEntry(entry);
        results.appendChild(li);
        if (i === selectedIndex) li.scrollIntoView({ block: "nearest" });
      });
    }

    async function executeEntry(entry) {
      await invoke("launch_entry", { entry });
      // The window will be hidden by the blur listener in Rust
    }

    input.oninput = () => {
      selectedIndex = 0;
      performSearch();
    };

    clearBtn.onclick = async () => {
      if (confirm("Clear all clipboard history?")) {
        await invoke("clear_clipboard_history");
        performSearch();
      }
    };

    window.onkeydown = (e) => {
      if (e.key === "Escape") {
        invoke("hide_window");
      } else if (e.key === "ArrowDown") {
        selectedIndex = (selectedIndex + 1) % entries.length;
        renderResults();
        e.preventDefault();
      } else if (e.key === "ArrowUp") {
        selectedIndex = (selectedIndex - 1 + entries.length) % entries.length;
        renderResults();
        e.preventDefault();
      } else if (e.key === "Enter") {
        if (entries[selectedIndex]) executeEntry(entries[selectedIndex]);
      }
    };

    // Auto-focus on show
    appWindow.onFocusChanged(({ payload: focused }) => {
      if (focused) {
        input.value = "";
        performSearch();
        input.focus();
        setTimeout(() => input.focus(), 50);
      }
    });

    performSearch();
  </script>
</body>
</html>
