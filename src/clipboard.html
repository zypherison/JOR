<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOR Clipboard</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .clear-btn {
      background: rgba(255, 50, 50, 0.12);
      border: 1px solid rgba(255, 50, 50, 0.25);
      color: #ff8888;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: "Inter", sans-serif;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(255, 50, 50, 0.2); border-color: rgba(255, 50, 50, 0.4); }
  </style>
</head>
<body>
  <div class="ambient ambient-b"></div>
  <div class="ambient-grid"></div>
  <div id="launcher">
    <div class="search-bar">
      <span class="search-pill">Clipboard</span>
      <input type="text" id="search-input" placeholder="Search history..." autocomplete="off" autofocus>
      <button class="clear-btn" id="clear-btn">Clear All</button>
    </div>
    <ul id="results"></ul>
    <div class="footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate &nbsp; <kbd>↵</kbd> copy &nbsp; <kbd>⎋</kbd> close</span>
      <span>JOR Clip v1.0</span>
    </div>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;
    const { listen } = window.__TAURI__.event;

    // ── Theme Syncing ───────────────────────────────────────────
    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.style.setProperty('--bg-top', theme.bg_top);
      document.documentElement.style.setProperty('--bg-mid', theme.bg_mid);
      document.documentElement.style.setProperty('--bg-bottom', theme.bg_bottom);
      document.documentElement.style.setProperty('--accent', theme.accent);
      document.documentElement.style.setProperty('--panel-border', theme.panel_border);
    }

    listen("theme-changed", (event) => applyTheme(event.payload));

    (async () => {
      try {
        const settings = await invoke("get_settings");
        applyTheme(settings.theme);
      } catch (err) {
        console.error("Failed to load theme:", err);
      }
    })();

    const input = document.getElementById("search-input");
    const results = document.getElementById("results");
    const clearBtn = document.getElementById("clear-btn");
    const appWindow = getCurrentWindow();

    let selectedIndex = 0;
    let entries = [];

    async function performSearch() {
      const query = input.value;
      try {
        entries = await invoke("search", { query, mode: "clipboard" });
        renderResults();
      } catch (err) {
        console.error(err);
      }
    }

    function renderResults() {
      results.innerHTML = "";
      if (entries.length === 0) {
        results.innerHTML = `<div style="text-align: center; padding: 40px; color: #888; font-size: 12px; font-family: 'JetBrains Mono'">No history found.</div>`;
        return;
      }

      entries.forEach((entry, i) => {
        const li = document.createElement("li");
        li.className = "item" + (i === selectedIndex ? " active" : "");
        li.innerHTML = `
          <div class="item-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </div>
          <div class="item-text">
            <div class="item-name">${entry.name}</div>
            <div class="item-sub">${entry.subtitle}</div>
          </div>
        `;
        li.onclick = () => executeEntry(entry);
        results.appendChild(li);
        if (i === selectedIndex) li.scrollIntoView({ block: "nearest" });
      });
    }

    async function executeEntry(entry) {
      await invoke("launch", { entry });
      // The window will be hidden by the backend launch logic
    }

    input.oninput = () => {
      selectedIndex = 0;
      performSearch();
    };

    clearBtn.onclick = async () => {
      if (confirm("Clear all clipboard history?")) {
        await invoke("clear_clipboard_history");
        performSearch();
      }
    };

    window.onkeydown = (e) => {
      if (e.key === "Escape") {
        invoke("hide_window");
      } else if (e.key === "ArrowDown") {
        selectedIndex = (selectedIndex + 1) % entries.length;
        renderResults();
        e.preventDefault();
      } else if (e.key === "ArrowUp") {
        selectedIndex = (selectedIndex - 1 + entries.length) % entries.length;
        renderResults();
        e.preventDefault();
      } else if (e.key === "Enter") {
        if (entries[selectedIndex]) executeEntry(entries[selectedIndex]);
      }
    };

    // Auto-focus on show
    appWindow.onFocusChanged(({ payload: focused }) => {
      if (focused) {
        input.value = "";
        performSearch();
        input.focus();
        setTimeout(() => input.focus(), 50);
      }
    });

    performSearch();
  </script>
</body>
</html>
